<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Socket.IO Backend Test</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        body { background-color: #1e1e1e; color: #d4d4d4; font-family: monospace; padding: 20px; }
        input, button { padding: 10px; margin: 5px; background: #333; border: 1px solid #555; color: white; }
        #logs { margin-top: 20px; border-top: 1px solid #555; padding-top: 20px; }
    </style>
</head>
<body>
    <h2>Backend Warm-up Test</h2>
    <p>Connected to Room: <strong id="roomId">football-tactics-101</strong></p>
    
    <input type="text" id="changeInput" placeholder="Type a code change here...">
    <button onclick="sendChange()">Send Change</button>

    <div id="logs">
        <h3>Server Logs:</h3>
    </div>

    <script>
        const logDiv = document.getElementById("logs");
        function logMessage(msg) {
            logDiv.innerHTML += `<p>> ${msg}</p>`;
        }

        const socket = io("http://localhost:5000");
        const testDocumentId = "football-tactics-101";

        socket.on("connect", () => {
            logMessage("✅ Connected to server with ID: " + socket.id);
            
            logMessage(`Requesting document: ${testDocumentId}`);
            socket.emit("get-document", testDocumentId);
        });

        socket.on("load-document", (data) => {
            logMessage("📄 Document loaded from DB. Content: " + JSON.stringify(data));
        });

        socket.on("receive-changes", (delta) => {
            logMessage("🔴 Received broadcast from teammate: " + JSON.stringify(delta));
        });

        function sendChange() {
            const inputVal = document.getElementById("changeInput").value;
            const delta = { text: inputVal, timestamp: Date.now() };
            
            logMessage("🔵 Sending change to server: " + JSON.stringify(delta));
            socket.emit("send-changes", delta);
            
            socket.emit("save-document", { latestText: inputVal });
        }
    </script>
</body>
</html>
